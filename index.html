<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>MathSpace</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MathSpace">

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
  :root {
    --primary: #3B6EA5;
    --primary-light: #EBF2FA;
    --bg: #F5F7FA;
    --card: #FFFFFF;
    --text: #1A1A2E;
    --muted: #8892A4;
    --border: #E8ECF2;
    --ok: #27AE60; --ok-bg: #E8F8EF;
    --mid: #2980B9; --mid-bg: #E8F4FD;
    --warn: #E67E22; --warn-bg: #FEF5E7;
    --bad: #E74C3C; --bad-bg: #FDEDEC;
    --radius: 18px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: calc(90px + env(safe-area-inset-bottom));
    padding-top: env(safe-area-inset-top);
    overflow-x: hidden;
  }

  /* ===== LOGIN ===== */
  #login-screen {
    position: fixed; inset: 0; z-index: 1000;
    background: linear-gradient(160deg, #1a3a5c 0%, #2C5F8A 60%, #4a8ab5 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 32px 24px;
    padding-top: calc(32px + env(safe-area-inset-top));
  }
  .login-emoji { font-size: 72px; margin-bottom: 12px; }
  .login-title { font-size: 36px; font-weight: 900; color: white; letter-spacing: -1px; margin-bottom: 4px; }
  .login-sub { color: rgba(255,255,255,0.6); font-size: 14px; margin-bottom: 40px; }

  .login-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 100%; max-width: 400px; margin-bottom: 32px; }
  .user-btn { background: rgba(255,255,255,0.12); border: 2px solid rgba(255,255,255,0.2); border-radius: 16px; padding: 12px 6px; display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; transition: all 0.2s; color: white; }
  .user-btn:active { transform: scale(0.95); background: rgba(255,255,255,0.2); }
  .user-btn.selected { background: rgba(255,255,255,0.25); border-color: white; }
  .user-btn .avatar { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 18px; color: white; }
  .user-btn span { font-size: 11px; font-weight: 600; opacity: 0.9; }

  .pin-container { width: 100%; max-width: 300px; }
  .pin-label { color: rgba(255,255,255,0.7); font-size: 13px; margin-bottom: 10px; text-align: center; }
  .pin-dots { display: flex; justify-content: center; gap: 12px; margin-bottom: 20px; }
  .pin-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.5); transition: all 0.2s; }
  .pin-dot.filled { background: white; border-color: white; }

  .pin-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .pin-key { background: rgba(255,255,255,0.12); border: none; border-radius: 14px; padding: 16px; font-size: 22px; font-weight: 700; color: white; cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .pin-key:active { transform: scale(0.92); background: rgba(255,255,255,0.25); }
  .pin-key.del { font-size: 18px; }
  .pin-key.empty { background: transparent; cursor: default; }
  .login-error { color: #ff6b6b; font-size: 13px; margin-top: 12px; text-align: center; display: none; }

  /* ===== PAGES ===== */
  .page { display: none; padding: 20px; animation: fadeIn 0.3s; }
  .page.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* ===== TOPBAR ===== */
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px 8px; background: var(--bg); position: sticky; top: 0; z-index: 50; }
  .topbar-left { display: flex; align-items: center; gap: 10px; }
  .topbar-avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 16px; color: white; }
  .topbar-name { font-weight: 800; font-size: 18px; }
  .topbar-right button { background: none; border: none; color: var(--muted); font-size: 13px; font-family: inherit; cursor: pointer; padding: 6px 10px; border-radius: 8px; }

  /* ===== NAV BAR & BADGES ===== */
  .nav-bar { position: fixed; bottom: calc(16px + env(safe-area-inset-bottom)); left: 16px; right: 16px; background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); border-radius: 28px; height: 68px; display: flex; align-items: center; justify-content: space-around; box-shadow: 0 8px 32px rgba(0,0,0,0.12); border: 1px solid rgba(255,255,255,0.8); z-index: 100; padding: 0 4px; }
  .nav-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; background: none; border: none; cursor: pointer; color: var(--muted); font-family: inherit; padding: 6px 4px; border-radius: 16px; transition: all 0.2s; flex: 1; position: relative; }
  .nav-btn i { font-size: 18px; }
  .nav-btn span { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
  .nav-btn.active { color: var(--primary); }
  .nav-btn.active i { transform: scale(1.15); }
  .badge { position: absolute; top: 2px; right: 12px; background: #E74C3C; color: white; font-size: 10px; font-weight: 800; padding: 2px 5px; border-radius: 99px; border: 2px solid white; display: none; }

  /* ===== SECTION HEADER ===== */
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .section-title { font-size: 22px; font-weight: 900; letter-spacing: -0.5px; }

  /* ===== CARDS ===== */
  .card { background: var(--card); border-radius: var(--radius); padding: 18px; margin-bottom: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.05); border: 1px solid var(--border); }

  /* ===== TAGS & BADGES ===== */
  .tag { display: inline-flex; align-items: center; font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 99px; background: var(--bg); color: var(--muted); border: 1px solid var(--border); }
  .tag-theme { background: var(--primary-light); color: var(--primary); border-color: #c5d9ed; }
  .tag-share { background: #FFF8E1; color: #F57F17; border-color: #FFE082; }
  .statut-badge { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 99px; }
  .s-ok { background: var(--ok-bg); color: var(--ok); }
  .s-mid { background: var(--mid-bg); color: var(--mid); }
  .s-warn { background: var(--warn-bg); color: var(--warn); }
  .s-bad { background: var(--bad-bg); color: var(--bad); }

  /* ===== FILTERS ===== */
  .filters { display: flex; gap: 8px; margin-bottom: 14px; overflow-x: auto; padding-bottom: 4px; }
  .filters::-webkit-scrollbar { display: none; }
  .filter-input, .filter-select { padding: 9px 13px; border: 1.5px solid var(--border); border-radius: 12px; font-family: inherit; font-size: 13px; background: white; white-space: nowrap; flex-shrink: 0; }
  .filter-input { min-width: 140px; }
  .filter-input:focus, .filter-select:focus { outline: none; border-color: var(--primary); }
  .teacher-eleve-filter { display: none; background-color: #fcf0e3; border-color: #f0c395; color: #b56b1e; font-weight:700; }

  /* ===== BUTTONS ===== */
  .btn-primary { background: var(--primary); color: white; border: none; border-radius: 13px; padding: 11px 18px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; display: flex; align-items: center; gap: 6px; white-space: nowrap; transition: all 0.15s; }
  .btn-primary:active { transform: scale(0.97); opacity: 0.9; }
  .btn-sm { padding: 6px 12px; border-radius: 9px; border: none; font-family: inherit; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
  .btn-sm:active { transform: scale(0.95); }
  .btn-edit { background: var(--primary-light); color: var(--primary); }
  .btn-del { background: var(--bad-bg); color: var(--bad); }

  /* ===== MODAL ===== */
  .modal-overlay { position: fixed; inset: 0; z-index: 500; background: rgba(0,0,0,0.5); display: none; align-items: flex-end; justify-content: center; padding: 0; }
  .modal-overlay.open { display: flex; }
  .modal { background: white; border-radius: 24px 24px 0 0; padding: 24px 20px calc(24px + env(safe-area-inset-bottom)); width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; animation: slideUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle { width: 36px; height: 4px; background: #ddd; border-radius: 99px; margin: 0 auto 20px; }
  .modal-title { font-size: 20px; font-weight: 900; margin-bottom: 20px; letter-spacing: -0.5px; }
  .form-group { margin-bottom: 14px; }
  .form-label { display: block; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .form-input, .form-select, .form-textarea { width: 100%; padding: 13px 14px; border: 1.5px solid var(--border); border-radius: 12px; font-family: inherit; font-size: 14px; background: var(--bg); transition: border-color 0.2s; color: var(--text); }
  .form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--primary); background: white; }
  .form-textarea { resize: vertical; min-height: 90px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .btn-cancel { flex: 1; padding: 13px; border: 1.5px solid var(--border); background: white; border-radius: 13px; font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; }
  .btn-confirm { flex: 2; }
  .photo-preview img { width: 100%; max-height: 150px; object-fit: contain; border-radius: 12px; margin-top: 8px; }
  .doc-preview-box { padding: 10px; background: #E8F4FD; color: #2980B9; border-radius: 8px; text-align: center; margin-top: 8px; font-weight: 600; font-size: 13px; border: 1px solid #bce0fd; }

  /* ===== CHAT ===== */
  .chat-container { background: white; border-radius: var(--radius); border: 1px solid var(--border); display: flex; flex-direction: column; height: 60vh; box-shadow: 0 2px 12px rgba(0,0,0,0.05); overflow: hidden; }
  .chat-box { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .chat-msg { max-width: 80%; padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.4; position: relative; }
  .chat-msg.me { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
  .chat-msg.other { align-self: flex-start; background: #f0f2f5; color: var(--text); border-bottom-left-radius: 4px; }
  .chat-time { font-size: 10px; opacity: 0.7; margin-top: 4px; text-align: right; }
  .chat-img { width: 100%; max-width: 250px; border-radius: 8px; margin-top: 4px; cursor: pointer; }
  .chat-input-area { display: flex; gap: 8px; padding: 12px; background: white; border-top: 1px solid var(--border); align-items: center; }
  .chat-input-area input[type="text"] { flex: 1; padding: 12px 16px; border-radius: 99px; border: 1px solid var(--border); font-family: inherit; font-size: 14px; background: var(--bg); outline: none; }
  .chat-photo-btn { background: var(--primary-light); color: var(--primary); border: none; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; transition: 0.2s; flex-shrink: 0; }
  .chat-send-btn { background: var(--primary); color: white; border: none; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: 0.2s; flex-shrink: 0; }
  .modal-chat { height: 85vh; display: flex; flex-direction: column; padding-bottom: calc(16px + env(safe-area-inset-bottom)); }
  .modal-chat .chat-container { border: none; box-shadow: none; height: 100%; flex: 1; }

  /* ===== DEVOIRS ===== */
  .devoirs-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .devoirs-col { background: white; border-radius: 18px; padding: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.05); border: 1px solid var(--border); min-height: 200px; }
  .devoirs-col-header { font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; color: var(--primary); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
  .devoirs-col-header-samia { color: #B55A8A !important; }
  .devoir-item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; line-height: 1.4; }
  .devoir-item:last-child { border-bottom: none; }
  .devoir-checkbox { width: 20px; height: 20px; border-radius: 6px; border: 2px solid var(--border); flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; transition: all 0.2s; margin-top: 1px; background: white; }
  .devoir-checkbox.checked { background: var(--ok); border-color: var(--ok); color: white; }
  .devoir-checkbox-samia.checked { background: #B55A8A; border-color: #B55A8A; }
  .devoir-text { flex: 1; white-space: pre-wrap; word-break: break-word;}
  .devoir-text.done { text-decoration: line-through; color: var(--muted); }
  .devoir-theme { font-size: 10px; font-weight: 700; color: var(--primary); text-transform: uppercase; margin-bottom:2px; }

  /* ===== DOCUMENTS ===== */
  .doc-chapter-group { margin-bottom: 20px; }
  .doc-chapter-title { font-size: 14px; font-weight: 800; color: var(--primary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; border-bottom: 2px solid var(--primary-light); padding-bottom: 4px; }
  .doc-card { background: white; border-radius: 14px; padding: 12px 16px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; border: 1px solid var(--border); cursor: pointer; transition: all 0.2s; }
  .doc-card:active { transform: scale(0.98); background: var(--bg); }
  .doc-info { display: flex; align-items: center; gap: 12px; flex: 1; overflow: hidden; }
  .doc-icon { font-size: 24px; }
  .doc-details { flex: 1; overflow: hidden; }
  .doc-title { font-weight: 700; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .doc-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* States */
  .empty-state { text-align: center; padding: 50px 20px; color: var(--muted); font-size: 15px; }
  .empty-state .emoji { font-size: 48px; display: block; margin-bottom: 12px; }
  .loading { text-align: center; padding: 40px; color: var(--muted); }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-emoji">🎓</div>
  <div class="login-title">MathSpace</div>
  <div class="login-sub">Cours particuliers de maths</div>

  <div class="login-grid" id="user-grid"></div>

  <div class="pin-container" id="pin-section" style="display:none">
    <div class="pin-label" id="pin-label">Entre ton code PIN</div>
    <div class="pin-dots">
      <div class="pin-dot" id="dot0"></div><div class="pin-dot" id="dot1"></div>
      <div class="pin-dot" id="dot2"></div><div class="pin-dot" id="dot3"></div>
    </div>
    <div class="pin-pad">
      <button class="pin-key" onclick="pinPress('1')">1</button><button class="pin-key" onclick="pinPress('2')">2</button><button class="pin-key" onclick="pinPress('3')">3</button>
      <button class="pin-key" onclick="pinPress('4')">4</button><button class="pin-key" onclick="pinPress('5')">5</button><button class="pin-key" onclick="pinPress('6')">6</button>
      <button class="pin-key" onclick="pinPress('7')">7</button><button class="pin-key" onclick="pinPress('8')">8</button><button class="pin-key" onclick="pinPress('9')">9</button>
      <button class="pin-key empty"></button><button class="pin-key" onclick="pinPress('0')">0</button><button class="pin-key del" onclick="pinDel()"><i class="fa fa-delete-left"></i></button>
    </div>
    <div class="login-error" id="login-error">❌ Code incorrect</div>
  </div>
</div>

<div id="app" style="display:none">

  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-avatar" id="topbar-avatar"></div>
      <div class="topbar-name" id="topbar-name"></div>
    </div>
    <div class="topbar-right">
      <button onclick="logout()"><i class="fa fa-right-from-bracket"></i></button>
    </div>
  </div>

  <div class="page active" id="page-exos">
    <div class="section-header">
      <div class="section-title">📚 Exercices</div>
      <button class="btn-primary" onclick="openExoModal()"><i class="fa fa-plus"></i> Ajouter</button>
    </div>
    <div class="filters">
      <select class="filter-select teacher-eleve-filter" id="filter-eleve-exos" onchange="loadExos()"></select>
      <input class="filter-input" id="filter-theme" placeholder="🔍 Thème..." oninput="loadExos()">
      <select class="filter-select" id="filter-statut" onchange="loadExos()">
        <option value="">Tous statuts</option>
        <option value="bien_reussi">✅ Bien réussi</option>
        <option value="compris_revoir">🔄 À revoir</option>
        <option value="a_revoir">⚠️ Difficile</option>
        <option value="rien_compris">❌ Rien compris</option>
      </select>
    </div>
    <div id="exo-list"></div>
  </div>

  <div class="page" id="page-devoirs">
    <div class="section-header">
      <div class="section-title">📝 Devoirs</div>
      <button class="btn-primary" onclick="openDevoirModal()"><i class="fa fa-plus"></i> Ajouter</button>
    </div>
    <div class="filters">
      <select class="filter-select teacher-eleve-filter" id="filter-eleve-devoirs" onchange="loadDevoirs()"></select>
    </div>
    <div class="devoirs-columns">
      <div class="devoirs-col">
        <div class="devoirs-col-header"><i class="fa fa-school"></i> École (Pronote)</div>
        <div id="devoirs-ecole"></div>
      </div>
      <div class="devoirs-col">
        <div class="devoirs-col-header devoirs-col-header-samia"><i class="fa fa-chalkboard-user"></i> Devoirs Samia</div>
        <div id="devoirs-samia"></div>
      </div>
    </div>
  </div>

  <div class="page" id="page-docs">
    <div class="section-header">
      <div class="section-title">📂 Documents</div>
      <button class="btn-primary" onclick="openDocModal()"><i class="fa fa-plus"></i> Nouveau</button>
    </div>
    <div class="filters">
      <select class="filter-select teacher-eleve-filter" id="filter-eleve-docs" onchange="loadDocs()"></select>
    </div>
    <div id="docs-list"></div>
  </div>

  <div class="page" id="page-fiches">
    <div class="section-header">
      <div class="section-title">📄 Fiches de cours</div>
      <button class="btn-primary" id="btn-add-fiche" onclick="openFicheModal()" style="display:none"><i class="fa fa-plus"></i> Créer</button>
    </div>
    <div id="fiche-list"></div>
  </div>

  <div class="page" id="page-chat">
    <div class="section-header">
      <div class="section-title">💬 Messagerie</div>
    </div>
    <div class="chat-container">
      <div class="chat-box" id="student-chat-box"></div>
      <div class="chat-input-area">
        <input type="file" id="file-upload-student" style="display:none;" accept="image/*" onchange="sendChatPhoto(this, false)">
        <button class="chat-photo-btn" onclick="document.getElementById('file-upload-student').click()"><i class="fa fa-camera"></i></button>
        <input type="text" id="student-chat-input" placeholder="Message..." onkeypress="if(event.key==='Enter') sendChatMessage()">
        <button class="chat-send-btn" onclick="sendChatMessage()"><i class="fa fa-paper-plane"></i></button>
      </div>
    </div>
  </div>

  <div class="page" id="page-overview">
    <div class="section-header">
      <div class="section-title">👩‍🏫 Suivi Élèves</div>
    </div>
    <div id="overview-list"></div>
  </div>

  <nav class="nav-bar">
    <button class="nav-btn active" id="nav-exos" onclick="showPage('exos')">
      <i class="fa fa-book-open"></i><span>Exercices</span>
    </button>
    <button class="nav-btn" id="nav-devoirs" onclick="showPage('devoirs')">
      <i class="fa fa-list-check"></i><span>Devoirs</span>
    </button>
    <button class="nav-btn" id="nav-docs" onclick="showPage('docs')">
      <i class="fa fa-folder-open"></i><span>Docs</span>
    </button>
    <button class="nav-btn" id="nav-fiches" onclick="showPage('fiches')">
      <i class="fa fa-file-lines"></i><span>Fiches</span>
    </button>
    <button class="nav-btn" id="nav-chat" onclick="showPage('chat')">
      <i class="fa fa-comments"></i><span>Messages</span>
      <div class="badge" id="badge-chat">0</div>
    </button>
    <button class="nav-btn" id="nav-overview" onclick="showPage('overview')" style="display:none">
      <i class="fa fa-users"></i><span>Élèves</span>
      <div class="badge" id="badge-overview">0</div>
    </button>
  </nav>

</div>

<div class="modal-overlay" id="samia-chat-modal">
  <div class="modal modal-chat">
    <div class="modal-handle"></div>
    <div class="modal-title" id="samia-chat-title">Chat avec ...</div>
    <div class="chat-container">
      <div class="chat-box" id="samia-chat-box"></div>

// ===== PHOTO & FILE HELPERS =====
function previewPhoto(inputId, previewId) {
  const file = document.getElementById(inputId).files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement("canvas");
      const MAX = 800; let w = img.width, h = img.height;
      if (w > MAX) { h = h * MAX / w; w = MAX; }
      if (h > MAX) { w = w * MAX / h; h = MAX; }
      canvas.width = w; canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      const compressed = canvas.toDataURL("image/jpeg", 0.7);
      document.getElementById(previewId).innerHTML = `<img src="${compressed}">`;
      document.getElementById(inputId).dataset.base64 = compressed;
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}
window.previewPhoto = previewPhoto;

function getPhotoBase64(inputId) { return document.getElementById(inputId).dataset.base64 || null; }

function previewDocFile(inputId, previewId) {
  const file = document.getElementById(inputId).files[0];
  if (!file) return;
  
  if (file.size > 750000) {
    alert("Fichier trop volumineux (Max 700 Ko). Si c'est un grand PDF, merci d'utiliser un lien Google Drive ou Pronote.");
    document.getElementById(inputId).value = "";
    return;
  }

  const reader = new FileReader();
  reader.onload = e => {
    if (file.type.includes("image")) {
      previewPhoto(inputId, previewId); // Fallback to image compression
      document.getElementById(inputId).dataset.type = "img";
    } else if (file.type === "application/pdf") {
      document.getElementById(inputId).dataset.base64 = e.target.result;
      document.getElementById(inputId).dataset.type = "pdf";
      document.getElementById(previewId).innerHTML = `<div class="doc-preview-box">📄 Document PDF chargé (${Math.round(file.size/1024)} Ko)</div>`;
    } else {
      alert("Format non supporté. PDF ou Image uniquement.");
      document.getElementById(inputId).value = "";
    }
  };
  reader.readAsDataURL(file);
}
window.previewDocFile = previewDocFile;

function openDocumentLink(id, base64Str, type, url) {
  if (url) { window.open(url, '_blank'); return; }
  if (base64Str) {
    if (type === "pdf") {
      // Create a temporary link to open the Base64 PDF
      let pdfWindow = window.open("");
      pdfWindow.document.write(`<iframe width='100%' height='100%' src='${base64Str}'></iframe>`);
    } else {
      let imgWindow = window.open("");
      imgWindow.document.write(`<img style="max-width:100%" src="${base64Str}">`);
    }
  }
}
window.openDocumentLink = openDocumentLink;

async function loadDocs() {
  const c = document.getElementById("docs-list");
  c.innerHTML = `<div class="loading">Chargement...</div>`;
  let targets = getStudentTarget("filter-eleve-docs");

  try {
    const snap = await db.collection("documents").where("eleve", "in", targets).get();
    let docs = snap.docs.map(d => ({id: d.id, ...d.data()}));
    
    if (docs.length === 0) { c.innerHTML = `<div class="empty-state"><span class="emoji">📂</span>Aucun document.</div>`; return; }

    // Group by chapter
    let grouped = {};
    docs.forEach(d => {
      let chap = d.chapitre || "Général";
      if (!grouped[chap]) grouped[chap] = [];
      grouped[chap].push(d);
    });

    let html = "";
    for (const [chap, list] of Object.entries(grouped)) {
      html += `<div class="doc-chapter-group">
                 <div class="doc-chapter-title">${chap}</div>`;
      list.forEach(d => {
        const icon = d.fileType === "pdf" ? "📕" : (d.url ? "🔗" : "🖼️");
        const dataStr = d.fileBase64 || "";
        const urlStr = d.url || "";
        html += `
          <div class="doc-card">
            <div class="doc-info" onclick="openDocumentLink('${d.id}', '${dataStr}', '${d.fileType}', '${urlStr}')">
              <div class="doc-icon">${icon}</div>
              <div class="doc-details">
                <div class="doc-title">${d.titre}</div>
                <div class="doc-meta">De: ${d.sender} ${USERS[currentUser].isTeacher ? `| Pour: ${d.eleve}` : ""}</div>
              </div>
            </div>
            <button class="btn-sm btn-del" onclick="deleteDoc('${d.id}')" style="margin-left:8px">🗑️</button>
          </div>`;
      });
      html += `</div>`;
    }
    c.innerHTML = html;
  } catch(e) { c.innerHTML = `<div class="error-msg">Erreur : ${e.message}</div>`; }
}
window.loadDocs = loadDocs;

// ===== NOTIFS, EXOS ET OVERVIEW (Restent globalement identiques avec correction filtres Samia) =====

async function loadExos() {
  const container = document.getElementById("exo-list");
  container.innerHTML = `<div class="loading">Chargement...</div>`;
  let targets = getStudentTarget("filter-eleve-exos");

  try {
    const snap = await db.collection("exercices").where("eleve", "in", targets).get();
    let docs = snap.docs.map(d => ({id: d.id, ...d.data()}));
    docs.sort((a,b) => (b.date||"") > (a.date||"") ? 1 : -1);
    
    const th = document.getElementById("filter-theme")?.value || "";
    const st = document.getElementById("filter-statut")?.value || "";
    if (th) docs = docs.filter(d => d.theme?.toLowerCase().includes(th.toLowerCase()) || d.titre?.toLowerCase().includes(th.toLowerCase()));
    if (st) docs = docs.filter(d => d.statut === st);

    if (docs.length === 0) { container.innerHTML = `<div class="empty-state">Aucun exercice.</div>`; return; }
    
    container.innerHTML = docs.map(d => {
      const s = STATUTS[d.statut] || {label: d.statut, cls: ""};
      const dataStr = JSON.stringify(d).replace(/\\/g,"\\\\").replace(/'/g,"\\'").replace(/`/g,"\\`");
      return `
      <div class="card">
        <div class="exo-titulo">${d.titre ? `<div class="exo-titre">${d.titre}</div>` : ""}</div>
        <div class="exo-meta">
          ${USERS[currentUser].isTeacher ? `<span class="tag" style="background:#FFE082;color:#d87b00">👤 ${d.eleve}</span>` : ""}
          ${d.theme ? `<span class="tag tag-theme">${d.theme}</span>` : ""}
        </div>
        <span class="statut-badge ${s.cls}">${s.label}</span>
        ${d.note ? `<div class="exo-note">${d.note}</div>` : ""}
        ${d.photoBase64 ? `<img class="exo-photo" src="${d.photoBase64}">` : ""}
        <div class="exo-footer">
          <span class="exo-date">${d.date ? new Date(d.date).toLocaleDateString("fr-FR") : ""}</span>
          <div class="exo-actions">
            <button class="btn-sm btn-edit" onclick='openEditExo("${d.id}", ${dataStr})'>✏️</button>
            <button class="btn-sm btn-del" onclick="deleteExo('${d.id}')">🗑️</button>
          </div>
        </div>
      </div>`;
    }).join("");
  } catch(e) { container.innerHTML = `<div class="error-msg">⚠️ Erreur : ${e.message}</div>`; }
}
window.loadExos = loadExos;

// Intégration des fonctions de chat (idem)
function initNotifications(isTeacher) {
  notifUnsubscribe = db.collection("messages").where("read", "==", false).onSnapshot(snap => {
    let unreadCount = 0; let hasNewMessage = false;
    snap.forEach(doc => {
      let m = doc.data();
      if (isTeacher && m.sender !== "Samia") { unreadCount++; hasNewMessage = true; }
      if (!isTeacher && m.eleve === currentUser && m.sender === "Samia") { unreadCount++; hasNewMessage = true; }
    });
    if (initialLoadDone && hasNewMessage && unreadCount > 0) notifSound.play().catch(()=>{});
    initialLoadDone = true;
    const badgeId = isTeacher ? "badge-overview" : "badge-chat";
    const badgeEl = document.getElementById(badgeId);
    if (unreadCount > 0) { badgeEl.textContent = unreadCount; badgeEl.style.display = "block"; } 
    else { badgeEl.style.display = "none"; }
    if (isTeacher && document.getElementById("page-overview").classList.contains("active")) loadOverview();
  });
}
// Chat (élève)
function initStudentChat() {
  if (chatUnsubscribe) chatUnsubscribe();
  document.getElementById("student-chat-box").innerHTML = `<div class="loading">Chargement...</div>`;
  markChatAsRead(currentUser, false);
  chatUnsubscribe = db.collection("messages").where("eleve", "==", currentUser).onSnapshot(snap => {
    let msgs = snap.docs.map(d => d.data());
    msgs.sort((a,b) => (a.date || "") > (b.date || "") ? 1 : -1);
    renderChat(msgs, "student-chat-box");
    markChatAsRead(currentUser, false);
  });
}
function sendChatMessage() {
  const input = document.getElementById("student-chat-input");
  const text = input.value.trim(); if (!text) return;
  db.collection("messages").add({ eleve: currentUser, sender: currentUser, text: text, date: new Date().toISOString(), read: false, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
  input.value = "";
}
window.sendChatMessage = sendChatMessage;

// Chat (Samia)
function openSamiaChat(eleveName) {
  currentChatStudent = eleveName;
  document.getElementById("samia-chat-title").textContent = `Chat avec ${eleveName}`;
  document.getElementById("samia-chat-modal").classList.add("open");
  if (chatUnsubscribe) chatUnsubscribe();
  markChatAsRead(eleveName, true);
  chatUnsubscribe = db.collection("messages").where("eleve", "==", eleveName).onSnapshot(snap => {
    let msgs = snap.docs.map(d => d.data());
    msgs.sort((a,b) => (a.date || "") > (b.date || "") ? 1 : -1);
    renderChat(msgs, "samia-chat-box");
    markChatAsRead(eleveName, true); 
  });
}
window.openSamiaChat = openSamiaChat;
function closeSamiaChat() { document.getElementById("samia-chat-modal").classList.remove("open"); if (chatUnsubscribe) { chatUnsubscribe(); chatUnsubscribe = null; } currentChatStudent = null; }
window.closeSamiaChat = closeSamiaChat;
function sendSamiaChatMessage() {
  const input = document.getElementById("samia-chat-input");
  const text = input.value.trim(); if (!text || !currentChatStudent) return;
  db.collection("messages").add({ eleve: currentChatStudent, sender: "Samia", text: text, date: new Date().toISOString(), read: false, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
  input.value = "";
}
window.sendSamiaChatMessage = sendSamiaChatMessage;
async function markChatAsRead(eleveName, isTeacher) {
  const snap = await db.collection("messages").where("eleve", "==", eleveName).where("read", "==", false).get();
  snap.docs.forEach(doc => { let m = doc.data(); if ((isTeacher && m.sender !== "Samia") || (!isTeacher && m.sender === "Samia")) db.collection("messages").doc(doc.id).update({ read: true }); });
}
function renderChat(msgs, containerId) {
  const box = document.getElementById(containerId);
  if (msgs.length === 0) { box.innerHTML = `<div class="empty-state">Aucun message.</div>`; return; }
  box.innerHTML = msgs.map(m => {
    const isMe = m.sender === currentUser; const timeStr = m.date ? new Date(m.date).toLocaleTimeString("fr-FR", {hour: '2-digit', minute:'2-digit'}) : "";
    return `<div class="chat-msg ${isMe ? 'me' : 'other'}">
      ${m.photoBase64 ? `<img src="${m.photoBase64}" class="chat-img" onclick="window.open(this.src)">` : ""}
      ${m.text ? `<div>${m.text}</div>` : ""}
      <div class="chat-time">${timeStr}</div></div>`;
  }).join("");
  setTimeout(() => { box.scrollTop = box.scrollHeight; }, 100);
}

function sendChatPhoto(inputElement, isSamia) {
  const file = inputElement.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image(); img.onload = () => {
      const canvas = document.createElement("canvas"); let w = img.width, h = img.height;
      if (w > 800) { h = h * 800 / w; w = 800; } if (h > 800) { w = w * 800 / h; h = 800; }
      canvas.width = w; canvas.height = h; canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      db.collection("messages").add({ eleve: isSamia ? currentChatStudent : currentUser, sender: isSamia ? "Samia" : currentUser, text: "", photoBase64: canvas.toDataURL("image/jpeg", 0.7), date: new Date().toISOString(), read: false, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
      inputElement.value = ""; 
    }; img.src = e.target.result;
  }; reader.readAsDataURL(file);
}
window.sendChatPhoto = sendChatPhoto;

async function loadOverview() {
  const c = document.getElementById("overview-list"); c.innerHTML = `<div class="loading">Chargement...</div>`;
  try {
    const [exoSnap, msgSnap] = await Promise.all([ db.collection("exercices").where("partageProf","==",true).get(), db.collection("messages").where("read", "==", false).get() ]);
    const exos = exoSnap.docs.map(d => ({id:d.id,...d.data()}));
    const unreadMap = {}; msgSnap.docs.forEach(d => { let m = d.data(); if (m.sender !== "Samia") unreadMap[m.eleve] = (unreadMap[m.eleve] || 0) + 1; });
    const eleves = Object.keys(USERS).filter(u => !USERS[u].isTeacher);
    c.innerHTML = eleves.map(eleve => {
      const eExos = exos.filter(e => e.eleve === eleve); const color = USERS[eleve].color; const unreadCount = unreadMap[eleve] || 0;
      return `<div class="card" style="border-left: 4px solid ${color}">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
          <div style="width:46px;height:46px;border-radius:50%;background:${color};display:flex;align-items:center;justify-content:center;font-weight:800;font-size:20px;color:white;flex-shrink:0">${eleve[0]}</div>
          <div style="flex:1"><div class="overview-eleve">${eleve}</div>
            <div class="stats-row">
              <span class="stat-chip s-ok">${eExos.filter(e=>e.statut==="bien_reussi").length} ✅</span>
              <span class="stat-chip s-bad">${eExos.filter(e=>e.statut==="rien_compris").length} ❌</span>
            </div>
          </div>
          ${unreadCount > 0 ? `<span class="notif-pill">${unreadCount} message(s)</span>` : ""}
        </div>
        <button class="btn-reply" onclick="openSamiaChat('${eleve}')"><i class="fa fa-comment-dots"></i> Ouvrir le Chat</button>
      </div>`;
    }).join("");
  } catch(e) { c.innerHTML = `<div class="error-msg">Erreur : ${e.message}</div>`; }
}

// Fiches
async function loadFiches() {
  const c = document.getElementById("fiche-list");
  try {
    const snap = await db.collection("fiches").get();
    const fiches = snap.docs.map(d => ({id:d.id,...d.data()})).filter(f => USERS[currentUser]?.isTeacher || f.destinataires?.includes(currentUser) || f.destinataires?.includes("Toutes"));
    if (fiches.length === 0) { c.innerHTML = `<div class="empty-state">Aucune fiche.</div>`; return; }
    c.innerHTML = fiches.map(f => `<div class="card">
        <div style="display:flex;justify-content:space-between;"><div><div class="fiche-titre">${f.titre}</div><div class="exo-meta">${f.theme ? `<span class="tag tag-theme">${f.theme}</span>` : ""}</div></div>
        ${USERS[currentUser]?.isTeacher ? `<button class="btn-sm btn-del" onclick="deleteFiche('${f.id}')">🗑️</button>` : ""}</div>
        ${f.contenu ? `<div class="fiche-contenu">${f.contenu}</div>` : ""}
        ${f.photoBase64 ? `<img class="exo-photo" src="${f.photoBase64}">` : ""}
        ${f.url ? `<iframe class="fiche-iframe" src="${f.url}"></iframe>` : ""}
      </div>`).join("");
  } catch(e) { c.innerHTML = `<div class="error-msg">Erreur : ${e.message}</div>`; }
}

// Global modal overlay close
document.querySelectorAll(".modal-overlay").forEach(overlay => {
  overlay.addEventListener("click", e => { if (e.target === overlay) { overlay.classList.remove("open"); if (overlay.id === "samia-chat-modal") closeSamiaChat(); } });
});

});
