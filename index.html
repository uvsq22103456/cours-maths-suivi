<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>MathSpace</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MathSpace">

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
  :root {
    --primary: #3B6EA5;
    --primary-light: #EBF2FA;
    --bg: #F5F7FA;
    --card: #FFFFFF;
    --text: #1A1A2E;
    --muted: #8892A4;
    --border: #E8ECF2;
    --ok: #27AE60; --ok-bg: #E8F8EF;
    --mid: #2980B9; --mid-bg: #E8F4FD;
    --warn: #E67E22; --warn-bg: #FEF5E7;
    --bad: #E74C3C; --bad-bg: #FDEDEC;
    --radius: 18px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: calc(90px + env(safe-area-inset-bottom));
    padding-top: env(safe-area-inset-top);
    overflow-x: hidden;
  }

  /* ===== LOGIN ===== */
  #login-screen {
    position: fixed; inset: 0; z-index: 1000;
    background: linear-gradient(160deg, #1a3a5c 0%, #2C5F8A 60%, #4a8ab5 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 32px 24px;
    padding-top: calc(32px + env(safe-area-inset-top));
  }
  .login-emoji { font-size: 72px; margin-bottom: 12px; }
  .login-title {
    font-size: 36px; font-weight: 900; color: white;
    letter-spacing: -1px; margin-bottom: 4px;
  }
  .login-sub { color: rgba(255,255,255,0.6); font-size: 14px; margin-bottom: 40px; }

  .login-grid {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 10px; width: 100%; max-width: 400px; margin-bottom: 32px;
  }
  .user-btn {
    background: rgba(255,255,255,0.12);
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 16px; padding: 12px 6px;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    cursor: pointer; transition: all 0.2s;
    color: white;
  }
  .user-btn:active { transform: scale(0.95); background: rgba(255,255,255,0.2); }
  .user-btn.selected { background: rgba(255,255,255,0.25); border-color: white; }
  .user-btn .avatar {
    width: 44px; height: 44px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 18px; color: white;
  }
  .user-btn span { font-size: 11px; font-weight: 600; opacity: 0.9; }

  .pin-container { width: 100%; max-width: 300px; }
  .pin-label { color: rgba(255,255,255,0.7); font-size: 13px; margin-bottom: 10px; text-align: center; }
  .pin-dots { display: flex; justify-content: center; gap: 12px; margin-bottom: 20px; }
  .pin-dot {
    width: 14px; height: 14px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.5);
    transition: all 0.2s;
  }
  .pin-dot.filled { background: white; border-color: white; }

  .pin-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .pin-key {
    background: rgba(255,255,255,0.12); border: none;
    border-radius: 14px; padding: 16px;
    font-size: 22px; font-weight: 700; color: white;
    cursor: pointer; font-family: inherit;
    transition: all 0.15s;
  }
  .pin-key:active { transform: scale(0.92); background: rgba(255,255,255,0.25); }
  .pin-key.del { font-size: 18px; }
  .pin-key.empty { background: transparent; cursor: default; }

  .login-error {
    color: #ff6b6b; font-size: 13px; margin-top: 12px;
    text-align: center; display: none;
  }

  /* ===== PAGES ===== */
  .page { display: none; padding: 20px; animation: fadeIn 0.3s; }
  .page.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* ===== TOPBAR ===== */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px 8px;
    background: var(--bg);
    position: sticky; top: 0; z-index: 50;
  }
  .topbar-left { display: flex; align-items: center; gap: 10px; }
  .topbar-avatar {
    width: 38px; height: 38px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 16px; color: white;
  }
  .topbar-name { font-weight: 800; font-size: 18px; }
  .topbar-right button {
    background: none; border: none; color: var(--muted);
    font-size: 13px; font-family: inherit; cursor: pointer;
    padding: 6px 10px; border-radius: 8px;
  }

  /* ===== NAV BAR ===== */
  .nav-bar {
    position: fixed;
    bottom: calc(16px + env(safe-area-inset-bottom));
    left: 16px; right: 16px;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(20px);
    border-radius: 28px;
    height: 68px;
    display: flex; align-items: center; justify-content: space-around;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    border: 1px solid rgba(255,255,255,0.8);
    z-index: 100;
  }
  .nav-btn {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-family: inherit;
    padding: 8px 16px; border-radius: 16px;
    transition: all 0.2s; flex: 1;
  }
  .nav-btn i { font-size: 20px; }
  .nav-btn span { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
  .nav-btn.active { color: var(--primary); }
  .nav-btn.active i { transform: scale(1.1); }

  /* ===== SECTION HEADER ===== */
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .section-title { font-size: 22px; font-weight: 900; letter-spacing: -0.5px; }

  /* ===== CARDS ===== */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    border: 1px solid var(--border);
  }

  /* ===== TAGS & BADGES ===== */
  .tag {
    display: inline-flex; align-items: center;
    font-size: 11px; font-weight: 600;
    padding: 3px 8px; border-radius: 99px;
    background: var(--bg); color: var(--muted);
    border: 1px solid var(--border);
  }
  .tag-theme { background: var(--primary-light); color: var(--primary); border-color: #c5d9ed; }
  .tag-share { background: #FFF8E1; color: #F57F17; border-color: #FFE082; }

  .statut-badge {
    font-size: 11px; font-weight: 700;
    padding: 4px 10px; border-radius: 99px;
  }
  .s-ok { background: var(--ok-bg); color: var(--ok); }
  .s-mid { background: var(--mid-bg); color: var(--mid); }
  .s-warn { background: var(--warn-bg); color: var(--warn); }
  .s-bad { background: var(--bad-bg); color: var(--bad); }

  /* ===== EXO CARD ===== */
  .exo-titre { font-weight: 700; font-size: 15px; margin-bottom: 8px; }
  .exo-meta { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 8px; }
  .exo-note {
    font-size: 13px; color: #555; padding: 10px 12px;
    background: var(--bg); border-radius: 10px;
    border-left: 3px solid var(--primary); margin: 8px 0;
  }
  .exo-photo { width: 100%; max-height: 200px; object-fit: contain; border-radius: 12px; margin-top: 8px; }
  .exo-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
  .exo-date { font-size: 11px; color: var(--muted); }
  .exo-actions { display: flex; gap: 6px; }

  /* ===== QUESTIONS ===== */
  .q-chapitre { font-size: 11px; font-weight: 700; color: var(--primary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .q-texte { font-size: 14px; font-weight: 500; }
  .q-reponse { margin-top: 10px; padding: 10px 12px; background: var(--ok-bg); border-radius: 10px; border-left: 3px solid var(--ok); font-size: 13px; color: #1a5c35; }
  .q-attente { margin-top: 8px; font-size: 12px; color: var(--muted); font-style: italic; }

  /* ===== FICHES ===== */
  .fiche-titre { font-size: 17px; font-weight: 800; margin-bottom: 8px; }
  .fiche-contenu { font-size: 13px; line-height: 1.7; color: #444; white-space: pre-wrap; margin-top: 10px; }

  /* ===== OVERVIEW ===== */
  .overview-eleve { font-size: 18px; font-weight: 800; }
  .stats-row { display: flex; gap: 6px; flex-wrap: wrap; margin: 8px 0; }
  .stat-chip { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 99px; }
  .exo-compact { padding: 8px 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; gap: 8px; font-size: 13px; }
  .q-compact-row { padding: 8px 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; gap: 8px; font-size: 13px; }
  .notif-pill { background: var(--bad-bg); color: var(--bad); font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 99px; }

  /* ===== FILTERS ===== */
  .filters { display: flex; gap: 8px; margin-bottom: 14px; overflow-x: auto; padding-bottom: 4px; }
  .filters::-webkit-scrollbar { display: none; }
  .filter-input, .filter-select {
    padding: 9px 13px; border: 1.5px solid var(--border);
    border-radius: 12px; font-family: inherit; font-size: 13px;
    background: white; white-space: nowrap; flex-shrink: 0;
  }
  .filter-input { min-width: 160px; }
  .filter-input:focus, .filter-select:focus { outline: none; border-color: var(--primary); }

  /* ===== BUTTONS ===== */
  .btn-primary {
    background: var(--primary); color: white;
    border: none; border-radius: 13px;
    padding: 11px 18px; font-size: 13px; font-weight: 700;
    cursor: pointer; font-family: inherit;
    display: flex; align-items: center; gap: 6px;
    white-space: nowrap; transition: all 0.15s;
  }
  .btn-primary:active { transform: scale(0.97); opacity: 0.9; }
  .btn-sm {
    padding: 6px 12px; border-radius: 9px; border: none;
    font-family: inherit; font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
  }
  .btn-sm:active { transform: scale(0.95); }
  .btn-edit { background: var(--primary-light); color: var(--primary); }
  .btn-del { background: var(--bad-bg); color: var(--bad); }
  .btn-reply { background: var(--ok-bg); color: var(--ok); }

  /* ===== MODAL ===== */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 500;
    background: rgba(0,0,0,0.5);
    display: none; align-items: flex-end; justify-content: center;
    padding: 0;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: white;
    border-radius: 24px 24px 0 0;
    padding: 24px 20px calc(24px + env(safe-area-inset-bottom));
    width: 100%; max-width: 600px;
    max-height: 90vh; overflow-y: auto;
    animation: slideUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle { width: 36px; height: 4px; background: #ddd; border-radius: 99px; margin: 0 auto 20px; }
  .modal-title { font-size: 20px; font-weight: 900; margin-bottom: 20px; letter-spacing: -0.5px; }
  .form-group { margin-bottom: 14px; }
  .form-label { display: block; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .form-input, .form-select, .form-textarea {
    width: 100%; padding: 13px 14px;
    border: 1.5px solid var(--border); border-radius: 12px;
    font-family: inherit; font-size: 14px; background: var(--bg);
    transition: border-color 0.2s; color: var(--text);
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--primary); background: white; }
  .form-textarea { resize: vertical; min-height: 90px; }
  .check-row { display: flex; align-items: center; gap: 10px; }
  .check-row input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--primary); }
  .check-row label { font-size: 14px; font-weight: 500; }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .btn-cancel {
    flex: 1; padding: 13px; border: 1.5px solid var(--border);
    background: white; border-radius: 13px; font-family: inherit;
    font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .btn-confirm { flex: 2; }

  /* Dest grid */
  .dest-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .dest-item { display: flex; align-items: center; gap: 5px; font-size: 13px; font-weight: 500; }
  .dest-item input { accent-color: var(--primary); }

  /* Photo preview */
  .photo-preview img { width: 100%; max-height: 150px; object-fit: contain; border-radius: 12px; margin-top: 8px; }

  /* Reply modal */
  .reply-eleve { font-weight: 700; margin-bottom: 6px; }
  .reply-q { font-size: 13px; color: var(--muted); margin-bottom: 14px; padding: 10px; background: var(--bg); border-radius: 10px; }

  /* States */
  .empty-state { text-align: center; padding: 50px 20px; color: var(--muted); font-size: 15px; }
  .empty-state .emoji { font-size: 48px; display: block; margin-bottom: 12px; }
  .loading { text-align: center; padding: 40px; color: var(--muted); }
  .error-msg { text-align: center; padding: 20px; color: var(--bad); font-size: 14px; background: var(--bad-bg); border-radius: 12px; }


  /* ===== TODO ===== */
  .todo-columns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .todo-col {
    background: white;
    border-radius: 18px;
    padding: 14px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    border: 1px solid var(--border);
    min-height: 200px;
  }
  .todo-col-header {
    font-size: 12px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--primary);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .todo-col-header-samia { color: #B55A8A !important; }
  .todo-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    line-height: 1.4;
  }
  .todo-item:last-child { border-bottom: none; }
  .todo-checkbox {
    width: 20px; height: 20px;
    border-radius: 6px;
    border: 2px solid var(--border);
    flex-shrink: 0;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    transition: all 0.2s;
    margin-top: 1px;
    background: white;
  }
  .todo-checkbox.checked {
    background: var(--ok);
    border-color: var(--ok);
    color: white;
  }
  .todo-checkbox-samia.checked { background: #B55A8A; border-color: #B55A8A; }
  .todo-text { flex: 1; }
  .todo-text.done { text-decoration: line-through; color: var(--muted); }
  .todo-theme { font-size: 10px; font-weight: 700; color: var(--primary); text-transform: uppercase; }
  .todo-del {
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 13px; padding: 2px 4px;
    border-radius: 6px; flex-shrink: 0;
    transition: all 0.2s;
  }
  .todo-del:active { color: var(--bad); background: var(--bad-bg); }
  .todo-empty { text-align: center; padding: 20px 10px; color: var(--muted); font-size: 12px; }

  /* Teacher badge */
  .teacher-badge { background: #FFF8E1; color: #F57F17; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 99px; margin-left: 6px; }
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="login-screen">
  <div class="login-emoji">🎓</div>
  <div class="login-title">MathSpace</div>
  <div class="login-sub">Cours particuliers de maths</div>

  <div class="login-grid" id="user-grid">
    <!-- filled by JS -->
  </div>

  <div class="pin-container" id="pin-section" style="display:none">
    <div class="pin-label" id="pin-label">Entre ton code PIN</div>
    <div class="pin-dots">
      <div class="pin-dot" id="dot0"></div>
      <div class="pin-dot" id="dot1"></div>
      <div class="pin-dot" id="dot2"></div>
      <div class="pin-dot" id="dot3"></div>
    </div>
    <div class="pin-pad">
      <button class="pin-key" onclick="pinPress('1')">1</button>
      <button class="pin-key" onclick="pinPress('2')">2</button>
      <button class="pin-key" onclick="pinPress('3')">3</button>
      <button class="pin-key" onclick="pinPress('4')">4</button>
      <button class="pin-key" onclick="pinPress('5')">5</button>
      <button class="pin-key" onclick="pinPress('6')">6</button>
      <button class="pin-key" onclick="pinPress('7')">7</button>
      <button class="pin-key" onclick="pinPress('8')">8</button>
      <button class="pin-key" onclick="pinPress('9')">9</button>
      <button class="pin-key empty"></button>
      <button class="pin-key" onclick="pinPress('0')">0</button>
      <button class="pin-key del" onclick="pinDel()"><i class="fa fa-delete-left"></i></button>
    </div>
    <div class="login-error" id="login-error">❌ Code incorrect</div>
  </div>
</div>

<!-- ===== APP ===== -->
<div id="app" style="display:none">

  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-avatar" id="topbar-avatar"></div>
      <div>
        <div class="topbar-name" id="topbar-name"></div>
      </div>
    </div>
    <div class="topbar-right">
      <button onclick="logout()"><i class="fa fa-right-from-bracket"></i></button>
    </div>
  </div>

  <!-- EXERCICES -->
  <div class="page active" id="page-exos">
    <div class="section-header">
      <div class="section-title">📚 Exercices</div>
      <button class="btn-primary" onclick="openExoModal()"><i class="fa fa-plus"></i> Ajouter</button>
    </div>
    <div class="filters">
      <input class="filter-input" id="filter-theme" placeholder="🔍 Thème..." oninput="loadExos()">
      <select class="filter-select" id="filter-statut" onchange="loadExos()">
        <option value="">Tous statuts</option>
        <option value="bien_reussi">✅ Bien réussi</option>
        <option value="compris_revoir">🔄 À revoir</option>
        <option value="a_revoir">⚠️ Difficile</option>
        <option value="rien_compris">❌ Rien compris</option>
      </select>
    </div>
    <div id="exo-list"></div>
  </div>

  <!-- QUESTIONS -->
  <div class="page" id="page-questions">
    <div class="section-header">
      <div class="section-title">💬 Questions</div>
      <button class="btn-primary" onclick="openQModal()"><i class="fa fa-plus"></i> Question</button>
    </div>
    <div id="q-list"></div>
  </div>

  <!-- FICHES -->
  <div class="page" id="page-fiches">
    <div class="section-header">
      <div class="section-title">📄 Fiches de cours</div>
      <button class="btn-primary" id="btn-add-fiche" onclick="openFicheModal()" style="display:none"><i class="fa fa-plus"></i> Ajouter</button>
    </div>
    <div id="fiche-list"></div>
  </div>

  <!-- TODO -->
  <div class="page" id="page-todo">
    <div class="section-header">
      <div class="section-title">✅ À faire</div>
      <button class="btn-primary" onclick="openTodoModal()"><i class="fa fa-plus"></i> Ajouter</button>
    </div>
    <div class="todo-columns">
      <div class="todo-col">
        <div class="todo-col-header"><i class="fa fa-user"></i> Seule</div>
        <div id="todo-seule"></div>
      </div>
      <div class="todo-col">
        <div class="todo-col-header todo-col-header-samia"><i class="fa fa-chalkboard-user"></i> Avec Samia</div>
        <div id="todo-samia"></div>
      </div>
    </div>
  </div>

  <!-- OVERVIEW (Samia) -->
  <div class="page" id="page-overview">
    <div class="section-header">
      <div class="section-title">👩‍🏫 Élèves</div>
    </div>
    <div id="overview-list"></div>
  </div>

  <!-- NAV -->
  <nav class="nav-bar">
    <button class="nav-btn active" id="nav-exos" onclick="showPage('exos')">
      <i class="fa fa-book-open"></i><span>Exercices</span>
    </button>
    <button class="nav-btn" id="nav-questions" onclick="showPage('questions')">
      <i class="fa fa-comment-dots"></i><span>Questions</span>
    </button>
    <button class="nav-btn" id="nav-todo" onclick="showPage('todo')">
      <i class="fa fa-circle-check"></i><span>À faire</span>
    </button>
    <button class="nav-btn" id="nav-fiches" onclick="showPage('fiches')">
      <i class="fa fa-file-lines"></i><span>Fiches</span>
    </button>
    <button class="nav-btn" id="nav-overview" onclick="showPage('overview')" style="display:none">

// ===== PHOTO =====
function previewPhoto(inputId, previewId) {
  const file = document.getElementById(inputId).files[0];
  if (!file) return;
  // Compress before storing
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement("canvas");
      const MAX = 800;
      let w = img.width, h = img.height;
      if (w > MAX) { h = h * MAX / w; w = MAX; }
      if (h > MAX) { w = w * MAX / h; h = MAX; }
      canvas.width = w; canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      const compressed = canvas.toDataURL("image/jpeg", 0.7);
      document.getElementById(previewId).innerHTML = `<img src="${compressed}">`;
      document.getElementById(inputId).dataset.base64 = compressed;
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function getPhotoBase64(inputId) {
  return document.getElementById(inputId).dataset.base64 || null;
}

  const data = {

    date: new Date().toISOString(),
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  };

async function loadExos() {
  const container = document.getElementById("exo-list");
  container.innerHTML = `<div class="loading">Chargement...</div>`;
  try {
    const snap = await db.collection("exercices")
      .where("eleve", "==", currentUser).get();
    let docs = snap.docs.map(d => ({id: d.id, ...d.data()}));
    docs.sort(function(a,b){ return (b.date||"") > (a.date||"") ? 1 : -1; });
    const th = document.getElementById("filter-theme")?.value || "";
    const st = document.getElementById("filter-statut")?.value || "";
    if (th) docs = docs.filter(d => d.theme?.toLowerCase().includes(th.toLowerCase()) || d.titre?.toLowerCase().includes(th.toLowerCase()));
    if (st) docs = docs.filter(d => d.statut === st);

    if (docs.length === 0) {
      container.innerHTML = `<div class="empty-state"><span class="emoji">📚</span>Aucun exercice encore.<br>Ajoutes-en un !</div>`;
      return;
    }
    container.innerHTML = docs.map(d => {
      const s = STATUTS[d.statut] || {label: d.statut, cls: ""};
      const date = d.date ? new Date(d.date).toLocaleDateString("fr-FR") : "";
      const dataStr = JSON.stringify(d).replace(/\\/g,"\\\\").replace(/'/g,"\\'").replace(/`/g,"\\`");

      <div class="card">
        <div class="exo-titulo">${d.titre ? `<div class="exo-titre">${d.titre}</div>` : ""}</div>
        <div class="exo-meta">

          <span class="tag">${d.type==="ensemble"?"Avec Samia":"Seule"}</span>
          ${d.partageProf ? `<span class="tag tag-share">📤 Partagé</span>` : ""}
        </div>
        <span class="statut-badge ${s.cls}">${s.label}</span>
        ${d.note ? `<div class="exo-note">${d.note}</div>` : ""}
        ${d.photoBase64 ? `<img class="exo-photo" src="${d.photoBase64}">` : ""}
        <div class="exo-footer">
          <span class="exo-date">${date}</span>
          <div class="exo-actions">
            <button class="btn-sm btn-edit" onclick='openEditExo("${d.id}", ${JSON.stringify(d)})'>✏️</button>
            <button class="btn-sm btn-del" onclick="deleteExo('${d.id}')">🗑️</button>
          </div>
        </div>
      </div>`;
    }).join("");
  } catch(e) {
    container.innerHTML = `<div class="error-msg">⚠️ Erreur : ${e.message}<br><small>Vérifiez les règles Firestore</small></div>`;
  }
}

    titre,
    theme: document.getElementById("fiche-theme").value.trim(),
    contenu: document.getElementById("fiche-contenu").value.trim(),
    destinataires: dests,
    date: new Date().toISOString(),
    auteur: "Samia",
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  };
  const photo = getPhotoBase64("fiche-img");
  if (photo) data.photoBase64 = photo;
  try {
    await db.collection("fiches").add(data);
    closeFicheModal();
    loadFiches();
  } catch(e) { alert("Erreur : " + e.message); }
  btn.textContent = "Publier 📤"; btn.disabled = false;
}

async function deleteFiche(id) {
  if (!confirm("Supprimer cette fiche ?")) return;
  await db.collection("fiches").doc(id).delete();
  loadFiches();
}

async function loadFiches() {
  const c = document.getElementById("fiche-list");
  c.innerHTML = `<div class="loading">Chargement...</div>`;
  const isTeacher = USERS[currentUser]?.isTeacher;
  try {
    const snap = await db.collection("fiches").get();
    const fiches = snap.docs.map(d => ({id:d.id,...d.data()})).filter(f => {
      if (isTeacher) return true;
      return f.destinataires?.includes(currentUser) || f.destinataires?.includes("Toutes");
    });
    if (fiches.length === 0) { c.innerHTML = `<div class="empty-state"><span class="emoji">📄</span>Aucune fiche pour l'instant.</div>`; return; }
    c.innerHTML = fiches.map(f => {
      const date = f.date ? new Date(f.date).toLocaleDateString("fr-FR") : "";
      return `
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div>
            <div class="fiche-titre">${f.titre}</div>
            <div class="exo-meta">
              ${f.theme ? `<span class="tag tag-theme">${f.theme}</span>` : ""}
              <span class="tag">Pour : ${f.destinataires?.join(", ")}</span>
            </div>
            <div class="exo-date">${date}</div>
          </div>
          ${isTeacher ? `<button class="btn-sm btn-del" onclick="deleteFiche('${f.id}')">🗑️</button>` : ""}
        </div>
        ${f.contenu ? `<div class="fiche-contenu">${f.contenu}</div>` : ""}
        ${f.photoBase64 ? `<img class="exo-photo" src="${f.photoBase64}">` : ""}
      </div>`;
    }).join("");
  } catch(e) { c.innerHTML = `<div class="error-msg">Erreur : ${e.message}</div>`; }
}

// ===== OVERVIEW =====
async function loadOverview() {
  const c = document.getElementById("overview-list");
  c.innerHTML = `<div class="loading">Chargement des élèves...</div>`;
  try {
    const [exoSnap, qSnap] = await Promise.all([
      db.collection("exercices").where("partageProf","==",true).get(),
      db.collection("questions").get()
    ]);
    const exos = exoSnap.docs.map(d => ({id:d.id,...d.data()}));
    const questions = qSnap.docs.map(d => ({id:d.id,...d.data()}));
    const eleves = Object.keys(USERS).filter(u => !USERS[u].isTeacher);

    c.innerHTML = eleves.map(eleve => {
      const eExos = exos.filter(e => e.eleve === eleve);
      const eQs = questions.filter(q => q.eleve === eleve);
      const unanswered = eQs.filter(q => !q.reponse);
      const color = USERS[eleve].color;
      const stats = {
        ok: eExos.filter(e=>e.statut==="bien_reussi").length,
        mid: eExos.filter(e=>e.statut==="compris_revoir").length,
        warn: eExos.filter(e=>e.statut==="a_revoir").length,
        bad: eExos.filter(e=>e.statut==="rien_compris").length
      };
      return `
      <div class="card" style="border-left: 4px solid ${color}">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
          <div style="width:46px;height:46px;border-radius:50%;background:${color};display:flex;align-items:center;justify-content:center;font-weight:800;font-size:20px;color:white;flex-shrink:0">${eleve[0]}</div>
          <div style="flex:1">
            <div class="overview-eleve">${eleve}</div>
            <div class="stats-row">
              <span class="stat-chip s-ok">${stats.ok} ✅</span>
              <span class="stat-chip s-mid">${stats.mid} 🔄</span>
              <span class="stat-chip s-warn">${stats.warn} ⚠️</span>
              <span class="stat-chip s-bad">${stats.bad} ❌</span>
            </div>
          </div>
          ${unanswered.length > 0 ? `<span class="notif-pill">${unanswered.length} ❓</span>` : ""}
        </div>
        ${eExos.length === 0 ? `<div style="font-size:13px;color:var(--muted);padding:4px 0">Aucun exercice partagé</div>` : `
          ${eExos.slice(0,4).map(e => {
            const s = STATUTS[e.statut] || {label:e.statut, cls:""};
            const date = e.date ? new Date(e.date).toLocaleDateString("fr-FR") : "";
            return `<div class="exo-compact">
              <div><strong>${e.titre}</strong> ${e.theme ? `<span class="tag tag-theme" style="margin-left:4px">${e.theme}</span>` : ""}</div>
              <div style="display:flex;gap:6px;align-items:center;flex-shrink:0">
                <span class="statut-badge ${s.cls}" style="font-size:10px">${s.label}</span>
                <span class="exo-date">${date}</span>
              </div>
            </div>`;
          }).join("")}
        `}
        ${eQs.length > 0 ? `
          <div style="margin-top:12px;border-top:1px solid var(--border);padding-top:12px">
            <div style="font-weight:700;font-size:13px;margin-bottom:8px">💬 Questions</div>
            ${eQs.slice(0,3).map(q => `
              <div class="q-compact-row">
                <div style="flex:1">${q.texte}</div>
                ${!q.reponse
                  ? `<button class="btn-sm btn-reply" onclick="openReplyModal('${q.id}','${eleve}',\`${q.texte.replace(/`/g,"'")}\`)">Répondre</button>`
                  : `<span style="font-size:12px;color:var(--ok)">✓ Répondu</span>`}
              </div>`).join("")}
          </div>` : ""}
      </div>`;
    }).join("");
  } catch(e) { c.innerHTML = `<div class="error-msg">Erreur : ${e.message}</div>`; }
}

function openReplyModal(qId, eleve, texte) {
  replyQId = qId;
  document.getElementById("reply-eleve-name").textContent = eleve;
  document.getElementById("reply-q-text").textContent = texte;
  document.getElementById("reply-text").value = "";
  document.getElementById("reply-modal").classList.add("open");
}
function closeReplyModal() { document.getElementById("reply-modal").classList.remove("open"); replyQId = null; }

async function sendReply() {
  const rep = document.getElementById("reply-text").value.trim();
  if (!rep || !replyQId) return;
  await db.collection("questions").doc(replyQId).update({ reponse: rep });
  closeReplyModal();
  loadOverview();
}

// Close modals on overlay click
document.querySelectorAll(".modal-overlay").forEach(overlay => {
  overlay.addEventListener("click", e => {
    if (e.target === overlay) overlay.classList.remove("open");
  });
});


// ===== TODO =====
function openTodoModal() {
  document.getElementById("todo-texte").value = "";
  document.getElementById("todo-theme").value = "";
  document.getElementById("todo-type").value = "seule";
  document.getElementById("todo-modal").classList.add("open");
}
function closeTodoModal() { document.getElementById("todo-modal").classList.remove("open"); }

async function saveTodo() {
  var texte = document.getElementById("todo-texte").value.trim();
  if (!texte) { alert("Écris la tâche !"); return; }
  var btn = document.getElementById("todo-save-btn");
  btn.textContent = "⏳ Ajout..."; btn.disabled = true;
  try {
    await db.collection("todos").add({
      eleve: currentUser,
      texte: texte,
      theme: document.getElementById("todo-theme").value.trim(),
      type: document.getElementById("todo-type").value,
      done: false,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    closeTodoModal();
    loadTodo();
  } catch(e) { alert("Erreur : " + e.message); }
  btn.textContent = "Ajouter ✅"; btn.disabled = false;
}

async function toggleTodo(id, done) {
  await db.collection("todos").doc(id).update({ done: !done });
  loadTodo();
}

async function deleteTodo(id) {
  await db.collection("todos").doc(id).delete();
  loadTodo();
}

async function loadTodo() {
  var cSeule = document.getElementById("todo-seule");
  var cSamia = document.getElementById("todo-samia");
  cSeule.innerHTML = '<div class="loading" style="padding:16px;font-size:13px">Chargement...</div>';
  cSamia.innerHTML = '<div class="loading" style="padding:16px;font-size:13px">Chargement...</div>';
  try {
    var snap = await db.collection("todos")
      .where("eleve", "==", currentUser).get();
    var todos = snap.docs.map(function(d) { return Object.assign({id: d.id}, d.data()); });
    todos.sort(function(a,b){ return (a.date||'') > (b.date||'') ? 1 : -1; });
    var seule = todos.filter(function(t) { return t.type === "seule"; });
    var avecSamia = todos.filter(function(t) { return t.type === "samia"; });

    function renderTodos(list, container, isSamia) {
      if (list.length === 0) {
        container.innerHTML = '<div class="todo-empty">Rien pour l'instant 🙂</div>';
        return;
      }
      var checkClass = isSamia ? "todo-checkbox todo-checkbox-samia" : "todo-checkbox";
      container.innerHTML = list.map(function(t) {
        return '<div class="todo-item">' +
          '<div class="' + checkClass + (t.done ? " checked" : "") + '" onclick="toggleTodo('' + t.id + '',' + t.done + ')">' +
          (t.done ? "✓" : "") + '</div>' +
          '<div class="todo-text' + (t.done ? " done" : "") + '">' +
          (t.theme ? '<div class="todo-theme">' + t.theme + '</div>' : '') +
          t.texte +
          '</div>' +
          '<button class="todo-del" onclick="deleteTodo('' + t.id + '')" title="Supprimer">✕</button>' +
          '</div>';
      }).join("");
    }

    renderTodos(seule, cSeule, false);
    renderTodos(avecSamia, cSamia, true);
  } catch(e) {
    cSeule.innerHTML = '<div style="font-size:12px;color:var(--bad);padding:8px">Erreur</div>';
    cSamia.innerHTML = '<div style="font-size:12px;color:var(--bad);padding:8px">Erreur</div>';
  }
}

// Init
buildUserGrid();
</script>
